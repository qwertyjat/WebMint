<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services — WebMint</title>
  <meta name="description" content="Custom websites, web apps, e-commerce, UI/UX design, SEO and ongoing care — delivered by a senior team." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header"></div>
  <section class="page-hero">
    <div class="container">
      <span class="eyebrow reveal">Services</span>
      <h1 class="reveal delay-1">Everything you need <span class="italic">on the web</span>.</h1>
      <p class="reveal delay-2">From a one-page launch site to a full production web app, we cover the full lifecycle — strategy, design, build, and care.</p>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div class="grid grid-3" id="allServices"></div>
    </div>
  </section>
  <section class="section" style="background:var(--bg-soft)">
    <div class="container text-center">
      <h2 class="reveal">Not sure which service fits?</h2>
      <p class="reveal delay-1">Book a free 20-minute call. We'll tell you honestly.</p>
      <a href="contact.html" class="btn btn-primary reveal delay-2">Book a call</a>
    </div>
  </section>
  <div id="footer"></div>
  <script src="config.js"></script><script src="main.js"></script>
  <script src="navigation.js"></script><script src="animations.js"></script>
  <script>
    fetch("data/services.json").then(r=>r.json()).then(list=>{
      document.getElementById("allServices").innerHTML = list.map((s,i)=>`
        <div class="card reveal delay-${(i%4)+1}">
          <div class="card-icon">${s.icon}</div>
          <h3>${s.title}</h3><p>${s.desc}</p>
          <ul style="list-style:none;padding:0;margin:16px 0 0">
            ${s.features.map(f=>`<li style="padding:4px 0;font-size:.9rem;color:var(--text-soft)">— ${f}</li>`).join("")}
          </ul>
        </div>`).join("");
      window.WM_initAnim();
    });
  </script>
</body>
</html>
