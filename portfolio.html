<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — WebMint</title>
  <meta name="description" content="Selected work from WebMint: marketing sites, storefronts and web apps." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header"></div>
  <section class="page-hero">
    <div class="container">
      <span class="eyebrow reveal">Portfolio</span>
      <h1 class="reveal delay-1">Work we're <span class="italic">proud of</span>.</h1>
      <p class="reveal delay-2">Confidentiality means we can only show a slice. Ask us for the full case studies during a call.</p>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div class="portfolio-grid" id="fullPortfolio"></div>
    </div>
  </section>
  <div id="footer"></div>
  <script src="config.js"></script><script src="main.js"></script>
  <script src="navigation.js"></script><script src="animations.js"></script>
  <script>
    fetch("data/portfolio.json").then(r=>r.json()).then(list=>{
      document.getElementById("fullPortfolio").innerHTML = list.map(p=>`
        <div class="portfolio-item reveal">
          <div class="portfolio-thumb" style="background:${p.color}">${p.title.charAt(0)}</div>
          <div class="portfolio-overlay"><span>${p.category}</span><h4>${p.title}</h4></div>
        </div>`).join("");
      window.WM_initAnim();
    });
  </script>
</body>
</html>
